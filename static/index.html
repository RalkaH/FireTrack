<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>FireTrack — Учет огнетушителей</title>

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Our styles -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    body {
      padding-top: 70px;
      background: var(--bg-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>

<body class="app-shell">
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#">
        <i class="bi bi-fire"></i>
        <span>FireTrack</span>
      </a>

      <!-- Mobile toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <!-- Left nav items -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" href="#" data-page="dashboard">
              <i class="bi bi-speedometer2 me-1"></i> Дашборд
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="extinguishers">
              <i class="bi bi-droplet me-1"></i> Огнетушители
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="locations">
              <i class="bi bi-geo-alt me-1"></i> Места
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="employees">
              <i class="bi bi-people me-1"></i> Сотрудники
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="inspections">
              <i class="bi bi-clipboard-check me-1"></i> Журнал проверок
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="import">
              <i class="bi bi-upload me-1"></i> Импорт
            </a>
          </li>
        </ul>

        <!-- Right: logout -->
        <button class="btn-logout" onclick="API.logout()">
          <i class="bi bi-box-arrow-right me-1"></i> Выход
        </button>
      </div>
    </div>
  </nav>

  <!-- Main content area -->
  <main class="container-fluid mt-4 mb-5 px-4">
    <div id="content"></div>
  </main>

  <!-- Universal Modal -->
  <div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <!-- Toast container for notifications -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App scripts -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/extinguishers.js"></script>
  <script src="/static/js/locations.js"></script>
  <script src="/static/js/employees.js"></script>
  <script src="/static/js/inspections.js"></script>
  <script src="/static/js/import.js"></script>

  <script>
    // ── Global state ──
    let isRecalculating = false;

    // ── Page router ──
    function loadPage(page) {
      // Add fade-out effect
      const content = document.getElementById('content');
      content.style.opacity = '0';
      content.style.transform = 'translateY(8px)';
      content.style.transition = 'opacity 0.2s ease, transform 0.2s ease';

      setTimeout(() => {
        if (page === 'dashboard') loadDashboard();
        else if (page === 'extinguishers') loadExtinguishers();
        else if (page === 'locations') loadLocations();
        else if (page === 'employees') loadEmployees();
        else if (page === 'inspections') loadInspections();
        else if (page === 'import') loadImportPage();

        // Fade in
        requestAnimationFrame(() => {
          content.style.opacity = '1';
          content.style.transform = 'translateY(0)';
        });
      }, 200);
    }

    // ── Toast notification system ──
    function showAlert(message, type = 'info') {
      const container = document.querySelector('.toast-container');
      const toastId = 'toast-' + Date.now();

      const icons = {
        success: 'bi-check-circle-fill',
        danger: 'bi-exclamation-triangle-fill',
        warning: 'bi-exclamation-circle-fill',
        info: 'bi-info-circle-fill'
      };

      const toastHtml = `
        <div id="${toastId}" class="toast align-items-center border-0 show" role="alert"
             style="background: var(--bg-card-dark); color: var(--text-white); border-radius: var(--radius-md);
                    box-shadow: var(--shadow-xl); margin-bottom: 0.5rem; animation: slideInRight 0.3s ease-out;
                    border: 1px solid var(--bg-glass-border);">
          <div class="d-flex align-items-center" style="padding: 0.75rem 1rem;">
            <i class="bi ${icons[type] || icons.info} me-2" style="color: var(--accent);"></i>
            <div class="toast-body" style="padding: 0; font-size: 0.9rem;">${message}</div>
            <button type="button" class="btn-close btn-close-white ms-3" data-bs-dismiss="toast"
                    style="font-size: 0.7rem; opacity: 0.6;"></button>
          </div>
        </div>
      `;

      container.insertAdjacentHTML('beforeend', toastHtml);

      // Auto-dismiss
      setTimeout(() => {
        const toast = document.getElementById(toastId);
        if (toast) {
          toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(100%)';
          setTimeout(() => toast.remove(), 300);
        }
      }, 4000);
    }

    // ── Initialize app ──
    document.addEventListener('DOMContentLoaded', () => {
      // Check auth
      if (!localStorage.getItem('access_token')) {
        window.location.href = '/static/login.html';
        return;
      }

      // Nav click handlers
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
          this.classList.add('active');
          loadPage(this.getAttribute('data-page'));
        });
      });

      // Load default page
      loadDashboard();
    });
  </script>
</body>

</html>
